<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>배경 영상 선택 — 슬롯 {{ slot }}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <a class="back-btn" href="/shorts/{{ slot }}/script">← 대본 확인</a>
  <span class="logo">배경 영상 선택</span>
  <span class="slot-chip">슬롯 {{ slot }}</span>
</header>

<main class="container">
  <div class="section-title">
    <h2>Pexels 후보 6개</h2>
    <p class="hint">현재 검색어: <code id="active-query">{{ image_prompt }}</code> &nbsp;|&nbsp; 최근 30일 사용 영상 자동 제외</p>
    <div style="display:flex; gap:.5rem; margin-top:.6rem; align-items:center;">
      <input id="custom-query" type="text" class="input-field"
             placeholder="검색어 직접 입력 (예: tokyo street night)"
             style="flex:1; max-width:420px;"
             onkeydown="if(event.key==='Enter') searchCustom()">
      <button class="btn btn-primary btn-sm" onclick="searchCustom()">🔍 검색</button>
      <button class="btn btn-ghost btn-sm" onclick="resetQuery()" title="GPT 검색어로 되돌리기">↩ 원래대로</button>
    </div>
  </div>

  <div id="loading" class="loading-box">
    <div class="spinner"></div>
    <p>Pexels에서 후보 영상 검색 중...</p>
  </div>

  <div id="bg-grid" class="bg-grid" style="display:none"></div>

  <div id="btn-refresh-zone" style="display:none; text-align:center; margin-top:1rem;">
    <div style="display:flex; gap:.6rem; justify-content:center; align-items:center;">
      <button id="btn-prev" class="btn btn-ghost" onclick="prevCandidates()" style="display:none">← 이전 영상</button>
      <button class="btn btn-ghost" onclick="nextCandidates()">다음 영상 →</button>
    </div>
    <p class="hint" id="refresh-hint" style="margin-top:.4rem"></p>
  </div>
</main>

<!-- 선택 완료 오버레이 -->
<div id="select-overlay" class="overlay" style="display:none">
  <div class="overlay-box">
    <div class="spinner spinner-lg"></div>
    <p>배경 영상 선택 중...</p>
  </div>
</div>

<script>
const SLOT = "{{ slot }}";
const DEFAULT_QUERY = "{{ image_prompt }}";
let _pageCount = 1;
let _currentQuery = "";  // 빈 문자열 = 서버 기본값(image_prompt) 사용

async function loadCandidates(page = 1, query = _currentQuery) {
  document.getElementById("loading").style.display = "flex";
  document.getElementById("bg-grid").style.display = "none";
  document.getElementById("btn-refresh-zone").style.display = "none";

  const params = new URLSearchParams({ page });
  if (query) params.set("q", query);

  const r = await fetch(`/api/shorts/${SLOT}/pexels?${params}`);
  document.getElementById("loading").style.display = "none";

  if (!r.ok) { alert("Pexels 로드 실패"); return; }
  const data = await r.json();
  document.getElementById("active-query").textContent = data.query;
  renderCandidates(data.candidates);
}

function searchCustom() {
  const q = document.getElementById("custom-query").value.trim();
  _currentQuery = q;
  _pageCount = 1;
  loadCandidates(1, q);
}

function resetQuery() {
  _currentQuery = "";
  document.getElementById("custom-query").value = "";
  _pageCount = 1;
  loadCandidates(1, "");
}

function nextCandidates() {
  _pageCount++;
  loadCandidates(_pageCount, _currentQuery);
}

function prevCandidates() {
  if (_pageCount <= 1) return;
  _pageCount--;
  loadCandidates(_pageCount, _currentQuery);
}

function updatePageUI() {
  document.getElementById("btn-prev").style.display = _pageCount > 1 ? "inline-flex" : "none";
  document.getElementById("refresh-hint").textContent =
    `세트 ${_pageCount} / 검색어: ${document.getElementById("active-query").textContent}`;
}

function fmtDur(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function renderCandidates(candidates) {
  const grid = document.getElementById("bg-grid");
  grid.style.display = "grid";
  document.getElementById("btn-refresh-zone").style.display = "block";
  updatePageUI();

  if (candidates.length === 0) {
    grid.innerHTML = '<p class="empty">Pexels에서 결과를 가져오지 못했습니다.<br>API 키 또는 쿼리를 확인해주세요.</p>';
    return;
  }

  grid.innerHTML = candidates.map((c, i) => `
    <div class="bg-card" id="bgcard-${i}">
      <div class="bg-thumb-wrap"
           onmouseenter="playPreview(${i})"
           onmouseleave="stopPreview(${i})">
        <img src="${c.thumb}" alt="썸네일" class="bg-thumb" id="bgimg-${i}">
        <video id="bgvid-${i}" class="bg-video" muted loop playsinline
               src="${c.url}" preload="none"></video>
        <div class="dur-badge">${fmtDur(c.duration)}</div>
        <div class="res-badge">${c.width}×${c.height}</div>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:.6rem"
              onclick="selectBg(${i}, '${escQ(c.url)}', '${escQ(c.thumb)}')">
        ✅ 선택
      </button>
    </div>
  `).join("");
}

function playPreview(i) {
  const vid = document.getElementById(`bgvid-${i}`);
  const img = document.getElementById(`bgimg-${i}`);
  if (!vid) return;
  vid.style.display = "block";
  img.style.display = "none";
  vid.play().catch(()=>{});
}
function stopPreview(i) {
  const vid = document.getElementById(`bgvid-${i}`);
  const img = document.getElementById(`bgimg-${i}`);
  if (!vid) return;
  vid.pause();
  vid.style.display = "none";
  img.style.display = "block";
}

async function selectBg(i, url, thumb) {
  document.getElementById("select-overlay").style.display = "flex";
  const r = await fetch(`/api/shorts/${SLOT}/select-bg`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({url, thumb}),
  });
  if (!r.ok) {
    document.getElementById("select-overlay").style.display = "none";
    alert("배경 선택 저장 실패");
    return;
  }
  location.href = `/shorts/${SLOT}/generate`;
}

function escQ(s) {
  return String(s).replace(/'/g, "\\'");
}

loadCandidates();
</script>
</body>
</html>
