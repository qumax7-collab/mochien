name: Mochien YouTube Shorts

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Noto Sans JP font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_PD_ID: ${{ secrets.ELEVENLABS_PD_ID }}
          ELEVENLABS_PD_VERSION_ID: ${{ secrets.ELEVENLABS_PD_VERSION_ID }}
        run: |
          echo "OPENAI_API_KEY=$OPENAI_API_KEY"                       >> .env
          echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY"               >> .env
          echo "ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID"             >> .env
          echo "PEXELS_API_KEY=$PEXELS_API_KEY"                       >> .env
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"               >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"                   >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"                       >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"                 >> .env
          echo "ELEVENLABS_PD_ID=$ELEVENLABS_PD_ID"                   >> .env
          echo "ELEVENLABS_PD_VERSION_ID=$ELEVENLABS_PD_VERSION_ID"   >> .env

      - name: Restore YouTube token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: echo "$YOUTUBE_CREDENTIALS" > token.json

      - name: Restore client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json

      - name: Restore previous gpt_results (이전 슬롯 누적)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mochien.yml
          name: gpt-results
          path: output/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: ignore

      - name: Fix artifact path (dawidd6가 gpt-results/ 서브폴더 생성 시 보정)
        run: |
          if [ -d "output/gpt-results" ]; then
            cp -r output/gpt-results/. output/
            rm -rf output/gpt-results
          fi
          echo "=== output/ 복원 상태 ==="
          find output/ -type f 2>/dev/null || echo "(비어있음)"

      - name: step2 — 기사 선택 (Telegram)
        run: python step2_select.py

      - name: step4 — Pexels 배경 영상
        run: python step4_pexels.py

      - name: step5 — ElevenLabs TTS
        run: python step5_tts.py

      - name: step6 — FFmpeg 합성
        run: python step6_ffmpeg.py

      - name: step7 — Whisper 자막
        run: python step7_whisper_subtitle.py

      - name: step9 — YouTube 업로드
        run: python step9_youtube.py

      - name: step10 — Gemini+Claude 검수
        continue-on-error: true
        run: python step10_gemini_review.py --mode shorts

      - name: Upload gpt_results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpt-results
          path: output/
          retention-days: 1
          overwrite: true

      - name: Commit used_videos.json
        if: always()
        continue-on-error: true
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git pull --rebase
          git add used_videos.json
          git diff --staged --quiet || git commit -m "chore: update used_videos.json [skip ci]"
          git push
