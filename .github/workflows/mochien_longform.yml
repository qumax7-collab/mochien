name: Mochien Longform

on:
  schedule:
    - cron: '0 10 * * *'  # JST 19:00 트리거 → 목표 21:00
  workflow_dispatch:       # 수동 실행 허용

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Noto Sans JP font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "OPENAI_API_KEY=$OPENAI_API_KEY"           >> .env
          echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY"   >> .env
          echo "ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID" >> .env
          echo "PEXELS_API_KEY=$PEXELS_API_KEY"           >> .env
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"   >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"       >> .env

      - name: Restore YouTube token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: echo "$YOUTUBE_CREDENTIALS" > token.json

      - name: Restore client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json

      - name: Download today's gpt_result artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mochien.yml
          name: gpt-results
          path: output/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: warn

      - name: run_longform — 롱폼 파이프라인 실행
        run: python run_longform.py
