name: Mochien Full Pipeline (쇼츠 3편 + 롱폼)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Noto Sans JP font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_PD_ID: ${{ secrets.ELEVENLABS_PD_ID }}
          ELEVENLABS_PD_VERSION_ID: ${{ secrets.ELEVENLABS_PD_VERSION_ID }}
        run: |
          echo "OPENAI_API_KEY=$OPENAI_API_KEY"                       >> .env
          echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY"               >> .env
          echo "ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID"             >> .env
          echo "PEXELS_API_KEY=$PEXELS_API_KEY"                       >> .env
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"               >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"                   >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"                       >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"                 >> .env
          echo "ELEVENLABS_PD_ID=$ELEVENLABS_PD_ID"                   >> .env
          echo "ELEVENLABS_PD_VERSION_ID=$ELEVENLABS_PD_VERSION_ID"   >> .env

      - name: Restore YouTube token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: echo "$YOUTUBE_CREDENTIALS" > token.json

      - name: Restore client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json

      # ─── 쇼츠 슬롯 1 (09) ───────────────────────────────
      - name: "[슬롯1] step2 — 기사 선택 (Telegram)"
        run: python step2_select.py

      - name: "[슬롯1] step4 — Pexels 배경 영상"
        run: python step4_pexels.py

      - name: "[슬롯1] step5 — ElevenLabs TTS"
        run: python step5_tts.py

      - name: "[슬롯1] step6 — FFmpeg 합성"
        run: python step6_ffmpeg.py

      - name: "[슬롯1] step7 — Whisper 자막"
        run: python step7_whisper_subtitle.py

      - name: "[슬롯1] step9 — YouTube 업로드"
        run: python step9_youtube.py

      - name: "[슬롯1] step10 — Gemini+Claude 검수"
        continue-on-error: true
        run: python step10_gemini_review.py --mode shorts

      # ─── 쇼츠 슬롯 2 (13) ───────────────────────────────
      - name: "[슬롯2] step2 — 기사 선택 (Telegram)"
        run: python step2_select.py

      - name: "[슬롯2] step4 — Pexels 배경 영상"
        run: python step4_pexels.py

      - name: "[슬롯2] step5 — ElevenLabs TTS"
        run: python step5_tts.py

      - name: "[슬롯2] step6 — FFmpeg 합성"
        run: python step6_ffmpeg.py

      - name: "[슬롯2] step7 — Whisper 자막"
        run: python step7_whisper_subtitle.py

      - name: "[슬롯2] step9 — YouTube 업로드"
        run: python step9_youtube.py

      - name: "[슬롯2] step10 — Gemini+Claude 검수"
        continue-on-error: true
        run: python step10_gemini_review.py --mode shorts

      # ─── 쇼츠 슬롯 3 (18) ───────────────────────────────
      - name: "[슬롯3] step2 — 기사 선택 (Telegram)"
        run: python step2_select.py

      - name: "[슬롯3] step4 — Pexels 배경 영상"
        run: python step4_pexels.py

      - name: "[슬롯3] step5 — ElevenLabs TTS"
        run: python step5_tts.py

      - name: "[슬롯3] step6 — FFmpeg 합성"
        run: python step6_ffmpeg.py

      - name: "[슬롯3] step7 — Whisper 자막"
        run: python step7_whisper_subtitle.py

      - name: "[슬롯3] step9 — YouTube 업로드"
        run: python step9_youtube.py

      - name: "[슬롯3] step10 — Gemini+Claude 검수"
        continue-on-error: true
        run: python step10_gemini_review.py --mode shorts

      # ─── gpt_results artifact 업로드 ────────────────────
      - name: Upload gpt_results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpt-results
          path: output/
          retention-days: 1
          overwrite: true

      # ─── 롱폼 파이프라인 ────────────────────────────────
      - name: long1 — 롱폼 스크립트 생성
        run: python long1_script.py

      - name: long2 — TTS 생성
        run: python long2_tts.py

      - name: long3 — Pexels 배경 영상 다운로드
        run: python long3_pexels.py

      - name: long4 — FFmpeg 영상 합성
        run: python long4_ffmpeg.py

      - name: long5 — Whisper 자막 합성
        run: python long5_whisper.py

      - name: long6 — YouTube 업로드
        run: python long6_youtube.py

      - name: step10 — Gemini+Claude 검수 (롱폼)
        continue-on-error: true
        run: python step10_gemini_review.py --mode longform
