name: Mochien Full Pipeline (쇼츠 2편 + 롱폼)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Noto Sans JP font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_PD_ID: ${{ secrets.ELEVENLABS_PD_ID }}
          ELEVENLABS_PD_VERSION_ID: ${{ secrets.ELEVENLABS_PD_VERSION_ID }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          echo "OPENAI_API_KEY=$OPENAI_API_KEY"                       >> .env
          echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY"               >> .env
          echo "ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID"             >> .env
          echo "PEXELS_API_KEY=$PEXELS_API_KEY"                       >> .env
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"               >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"                   >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"                       >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"                 >> .env
          echo "ELEVENLABS_PD_ID=$ELEVENLABS_PD_ID"                   >> .env
          echo "ELEVENLABS_PD_VERSION_ID=$ELEVENLABS_PD_VERSION_ID"   >> .env
          echo "WP_URL=$WP_URL"                                       >> .env
          echo "WP_USERNAME=$WP_USERNAME"                             >> .env
          echo "WP_APP_PASSWORD=$WP_APP_PASSWORD"                     >> .env

      - name: Restore YouTube token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: echo "$YOUTUBE_CREDENTIALS" > token.json

      - name: Restore client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json

      # ─── 전체 파이프라인 실행 ────────────────────────────
      - name: run_all — 기사 일괄 선택 + 쇼츠 2편 + 롱폼
        run: python run_all.py

      # ─── gpt_results artifact 업로드 ────────────────────
      - name: Upload gpt_results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpt-results
          path: output/
          retention-days: 1
          overwrite: true

      - name: Commit used_videos.json + active_longform.json
        if: always()
        continue-on-error: true
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git pull --rebase
          git add used_videos.json active_longform.json
          git diff --staged --quiet || git commit -m "chore: update used_videos + active_longform [skip ci]"
          git push
